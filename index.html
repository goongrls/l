<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Accès 18+</title> <!-- Titre générique, pas de lantmadison -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Redirection automatique après 0.5 seconde -->
  <meta http-equiv="refresh" content="0.5;url=https://getmysocial.com/lantmadison">

  <!-- Pour que l'image s'affiche si partagé -->
  <meta property="og:title" content="Accès 18+">
  <meta property="og:description" content="Cliquez pour accéder au contenu.">
  <meta property="og:image" content="https://raw.githubusercontent.com/goongrls/l/main/preview.jpg">
  <meta property="og:type" content="website">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Accès 18+">
  <meta name="twitter:description" content="Cliquez pour accéder au contenu.">
  <meta name="twitter:image" content="https://raw.githubusercontent.com/goongrls/l/main/preview.jpg">

  <style>
    /* Optionnel : cacher tout contenu visible */
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    .loading {
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="loading">
    <h1>Accès 18+</h1>
    <p>Redirection en cours...</p>
    <img src="https://raw.githubusercontent.com/goongrls/l/main/preview.jpg" alt="Preview" width="300">
  </div>

  <script>
    // Redirection rapide avec JavaScript au cas où le meta refresh ne fonctionne pas
    setTimeout(() => {
      window.location.href = "https://getmysocial.com/lantmadison";
    }, 500); // 0.5 seconde
  </script>
</body>
</html>
